version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: dockerfile
      target: backend
    container_name: scattergories-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
    volumes:
      - ./backend:/app/backend
    command: python app.py
    
    env_file:
      - backend/.env

  frontend:
    build:
      context: .
      dockerfile: dockerfile
      target: frontend
    container_name: scattergories-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    command: npm run dev -- --host
    depends_on:
      - backend 

volumes:
  data: